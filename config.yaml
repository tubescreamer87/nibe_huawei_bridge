name: "Nibe-Huawei Bridge"
description: "Emuluje Huawei SUN2000 cez Modbus TCP – Nibe S1255 sa pripojí priamo a číta FV/batériové dáta"
version: "2.1.2"
slug: "nibe_huawei_bridge"
init: false
hassio_api: true
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

ports:
  5020/tcp: 5020
ports_description:
  5020/tcp: "Modbus TCP (SUN2000 emulácia pre Nibe S1255)"

options:
  update_interval: 30
  log_level: "info"
  sensors:
    pv_power: "sensor.emma_pv_output_power"
    battery_soc: "sensor.emma_state_of_capacity"
    battery_power: "sensor.emma_battery_charge_discharge_power"
    grid_power: "sensor.emma_feed_in_power"
  # Modbus TCP server – Nibe S1255 sa pripojí ako master a číta SUN2000 registre
  modbus_server:
    enabled: true
    port: 5020          # 502 vyžaduje root; použite 5020 ako default
    host: "0.0.0.0"
    unit_id: 1
  # Surplus logika - riadenie TÚV a heating offsetu podľa prebytku (fallback)
  surplus_control:
    enabled: false
    nibe_hub: "nibe"
    # Prahové hodnoty v W
    tuv_normal_w: 1000
    tuv_luxury_w: 3000
    heating_offset_w: 5000
    heating_offset_value: 3
    # Počet cyklov pod prahom pred znížením módu (hysteréza)
    hysteresis_cycles: 3

schema:
  update_interval: int
  log_level: "list(debug|info|warning|error)"
  sensors:
    pv_power: str
    battery_soc: str
    battery_power: str
    grid_power: str
  modbus_server:
    enabled: bool
    port: int
    host: str
    unit_id: int
  surplus_control:
    enabled: bool
    nibe_hub: str
    tuv_normal_w: int
    tuv_luxury_w: int
    heating_offset_w: int
    heating_offset_value: int
    hysteresis_cycles: int
