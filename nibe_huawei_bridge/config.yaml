name: "Nibe-Huawei Bridge"
description: "Emuluje Huawei EMMA (SmartHEMS) cez Modbus TCP – Nibe S1255 sa pripojí priamo a číta FV/batériové dáta"
version: "2.7.1"
slug: "nibe_huawei_bridge"
init: false
hassio_api: true
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

ports:
  5020/tcp: 5020
ports_description:
  5020/tcp: "Modbus TCP (EMMA emulácia pre Nibe S1255)"

options:
  update_interval: 30
  log_level: "info"
  rated_power_kw: 10
  sensors:
    # pv_power → EMMA reg 30354 (PV output power). Default uses the reliable DC-input
    # sensor; switch to "sensor.emma_pv_output_power" for strict 1:1 if your firmware
    # reports it correctly in daylight.
    pv_power: "sensor.inverter_input_power"
    active_power: "sensor.inverter_active_power"
    battery_soc: "sensor.emma_state_of_capacity"
    battery_power: "sensor.emma_battery_charge_discharge_power"
    grid_power: "sensor.emma_feed_in_power"
    # Optional – leave empty ("") to skip
    load_power: "sensor.emma_load_power"
    daily_yield_kwh: "sensor.emma_inverter_energy_yield_today"
    total_yield_kwh: "sensor.emma_inverter_total_energy_yield"
    grid_export_today_kwh: "sensor.emma_feed_in_to_grid_today"
    grid_import_today_kwh: "sensor.emma_supply_from_grid_today"
  # Modbus TCP server – Nibe S1255 sa pripojí ako master a číta EMMA registre.
  # EMMA odpovedá na logical-device-id (unit) = 0.
  modbus_server:
    enabled: true
    port: 5020          # 502 vyžaduje root; použite 5020 ako default
    host: "0.0.0.0"
    unit_id: 0
  # Diagnostic mode – writes unique fingerprint values to each key register
  # to identify which Nibe display reads which register. Disable when done.
  diagnostic_mode: false
  # Test mode – hardcoded values, skips HA sensor polling
  test_mode:
    enabled: false
    pv_power: 0          # W – simulated PV production
    battery_soc: 80      # % – simulated battery state of charge
    battery_power: -500  # W – positive=charging, negative=discharging
    grid_power: -1000    # W – positive=import, negative=export (negative ⇒ surplus)
  # MITM proxy – transparentne preposiela Modbus TCP od Nibe na skutočnú EMMA a loguje registre
  mitm_mode:
    enabled: false
    upstream_host: "192.168.68.79"
    upstream_port: 502
    upstream_unit_id: 0   # logical-device-id skutočnej EMMA
  # Surplus logika - riadenie TÚV a heating offsetu podľa prebytku (fallback)
  surplus_control:
    enabled: false
    nibe_hub: "nibe"
    # Prahové hodnoty v W
    tuv_normal_w: 1000
    tuv_luxury_w: 3000
    heating_offset_w: 5000
    heating_offset_value: 3
    # Počet cyklov pod prahom pred znížením módu (hysteréza)
    hysteresis_cycles: 3

schema:
  update_interval: int
  log_level: "list(debug|info|warning|error)"
  rated_power_kw: int
  sensors:
    pv_power: str
    active_power: str
    battery_soc: str
    battery_power: str
    grid_power: str
    load_power: str
    daily_yield_kwh: str
    total_yield_kwh: str
    grid_export_today_kwh: str
    grid_import_today_kwh: str
  diagnostic_mode: bool
  modbus_server:
    enabled: bool
    port: int
    host: str
    unit_id: int
  test_mode:
    enabled: bool
    pv_power: int
    battery_soc: int
    battery_power: int
    grid_power: int
  mitm_mode:
    enabled: bool
    upstream_host: str
    upstream_port: int
    upstream_unit_id: int
  surplus_control:
    enabled: bool
    nibe_hub: str
    tuv_normal_w: int
    tuv_luxury_w: int
    heating_offset_w: int
    heating_offset_value: int
    hysteresis_cycles: int
